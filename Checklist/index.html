<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checklist Diário Organizacional</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Plus Jakarta Sans for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons for modern, clean icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Client library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-info">
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <span class="organization-tag" id="org-tag">Checklist Organizacional</span>
                    <span class="history-badge" id="history-badge">Histórico</span>
                </div>
                <h1 id="app-title">Checklist Diário</h1>
                <div class="date-picker-wrapper">
                    <input type="date" id="checklist-date" class="date-select-input">
                    <span id="current-date" class="current-date">Carregando data...</span>
                    <i data-lucide="chevron-down" class="date-chevron"></i>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-reset-checklist" class="icon-button" title="Reiniciar Checklist">
                    <i data-lucide="rotate-ccw"></i>
                </button>
                <button id="btn-toggle-edit" class="icon-button" title="Editar Checklist">
                    <i data-lucide="edit-3"></i>
                </button>
                <button id="btn-manage-tasks" class="icon-button" title="Configurações">
                    <i data-lucide="settings"></i>
                </button>
            </div>
        </header>

        <!-- Progress Card -->
        <section class="progress-card-container">
            <div class="progress-card">
                <div class="progress-info">
                    <div class="progress-text-group">
                        <span class="progress-label">Progresso do Dia</span>
                        <h2 id="progress-percentage">0%</h2>
                        <p id="progress-tasks-count">0 de 0 concluídos</p>
                    </div>
                    <!-- Circular Progress bar or simple premium line. Circular works beautifully -->
                    <div class="progress-ring-wrapper">
                        <svg class="progress-ring" width="80" height="80">
                            <circle class="progress-ring-bg" stroke="rgba(255,255,255,0.06)" stroke-width="8" fill="transparent" r="32" cx="40" cy="40"/>
                            <circle class="progress-ring-circle" id="progress-circle" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="32" cx="40" cy="40"/>
                            <defs>
                                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#a855f7" />
                                    <stop offset="100%" stop-color="#3b82f6" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="progress-ring-icon">
                            <i data-lucide="check-check" class="success-icon"></i>
                        </div>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
            </div>
        </section>

        <!-- Categories Filters (Horizontal scroll on mobile) -->
        <section class="categories-bar">
            <button class="category-chip active" data-category="all">
                <i data-lucide="layers" class="chip-icon"></i>
                <span>Todos</span>
            </button>
            <button class="category-chip" data-category="abertura">
                <i data-lucide="sun" class="chip-icon"></i>
                <span>Abertura</span>
            </button>
            <button class="category-chip" data-category="operacao">
                <i data-lucide="play-circle" class="chip-icon"></i>
                <span>Operação</span>
            </button>
            <button class="category-chip" data-category="limpeza">
                <i data-lucide="sparkles" class="chip-icon"></i>
                <span>Limpeza</span>
            </button>
            <button class="category-chip" data-category="fechamento">
                <i data-lucide="moon" class="chip-icon"></i>
                <span>Fechamento</span>
            </button>
        </section>

        <!-- Task List Container -->
        <main class="tasks-section">
            <div id="tasks-list" class="tasks-list">
                <!-- Javascript will inject tasks here -->
            </div>
            
            <!-- Empty state -->
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-state-icon">
                    <i data-lucide="clipboard-list"></i>
                </div>
                <h3>Nenhuma tarefa cadastrada</h3>
                <p>Toque no botão abaixo ou nas configurações para adicionar tarefas ao seu checklist.</p>
            </div>
        </main>

        <!-- Bottom Actions (Stuck to bottom on mobile) -->
        <footer class="app-footer">
            <button id="btn-add-task-modal" class="btn btn-secondary">
                <i data-lucide="plus"></i> Nova Tarefa
            </button>
            <button id="btn-share-report" class="btn btn-primary">
                <i data-lucide="share-2"></i> Relatório WhatsApp
            </button>
        </footer>
    </div>

    <!-- Modal: Add Task -->
    <div id="modal-add-task" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Tarefa</h2>
                <button class="modal-close" id="btn-close-add-modal"><i data-lucide="x"></i></button>
            </div>
            <form id="form-add-task">
                <div class="form-group">
                    <label for="task-title">Descrição da Tarefa</label>
                    <input type="text" id="task-title" required placeholder="Ex: Verificar temperatura do freezer" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="task-category">Categoria</label>
                    <select id="task-category" required>
                        <option value="abertura">Abertura</option>
                        <option value="operacao">Operação</option>
                        <option value="limpeza">Limpeza</option>
                        <option value="fechamento">Fechamento</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="task-recurring">Recorrência</label>
                    <select id="task-recurring" required>
                        <option value="true">Diária (Reinicia todo dia)</option>
                        <option value="false">Única (Acumula para o próximo dia se não feita)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Adicionar Tarefa</button>
            </form>
        </div>
    </div>

    <!-- Modal: Settings -->
    <div id="modal-manage-tasks" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurações</h2>
                <button class="modal-close" id="btn-close-manage-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="manage-tasks-body">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="input-org-name">Nome da Organização</label>
                    <input type="text" id="input-org-name" placeholder="Ex: Minha Empresa" autocomplete="off">
                </div>
                
                <div class="form-group" style="margin-bottom: 16px;">
                    <label for="input-supabase-url">Supabase URL</label>
                    <input type="text" id="input-supabase-url" placeholder="https://xxxx.supabase.co" autocomplete="off">
                </div>
                
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="input-supabase-key">Supabase Anon Key</label>
                    <input type="password" id="input-supabase-key" placeholder="Senha/Key" autocomplete="off">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                    <button id="btn-reset-default" class="btn btn-secondary btn-block" style="border: 1px solid var(--border-color);">
                        <i data-lucide="rotate-ccw"></i> Restaurar Checklist Padrão
                    </button>
                    <button id="btn-clear-all" class="btn btn-danger-outline btn-block">
                        <i data-lucide="trash-2"></i> Limpar Todas as Tarefas
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
